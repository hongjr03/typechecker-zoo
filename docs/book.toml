[book]
authors = ["Stephen Diehl"]
language = "zh-CN"
multilingual = false
src = "src"
title = "类型检查器动物园"
description = "用于学习类型检查器实现的教程"

[preprocessor.include-rs]
base-dir = ".."

[build]
build-dir = "book"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
smart-punctuation = true
mathjax-support = true
copy-fonts = true
additional-css = ["src/custom.css"]
favicon = "src/lean.png"
additional-js = ["src/favicon.js"]
git-repository-url = "https://github.com/hongjr03/typechecker-zoo"
edit-url-template = "https://github.com/hongjr03/typechecker-zoo/edit/main/docs/{path}"

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.fold]
enable = false
level = 0

[output.html.playground]
editable = false
copyable = true
copy-js = true
line-numbers = false

[output.html.code]

